<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nick Gertonson</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="scss/style.css">
</head>

<body>
  <main class="stage">
    <div class="card-scene">
      <div class="card" id="card">
        <div class="card-face card-face-back">
          <div class="card-stats">
            <h2 class="card-stats-title">Stats</h2>
            <ul class="card-stats-list">
              <li>Design Systems</li>
              <li>UI / UX</li>
              <li>Component Libraries</li>
              <li>CSS / SCSS</li>
              <li>Figma</li>
              <li>Accessibility</li>
            </ul>
            <span class="card-flip-hint">Click to flip back</span>
          </div>
        </div>
        <div class="card-face card-face-front">
          <div class="card-glare"></div>
          <div class="card-photo">
            <img src="img/nick-face.jpg" alt="Nick Gertonson">
          </div>
          <a class="card-link" href="https://www.linkedin.com/in/nickgertonson/" target="_blank" rel="noopener noreferrer" aria-label="Nick Gertonson on LinkedIn" data-no-flip>
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </a>
          <div class="card-info">
            <h1 class="card-name">Nick Gertonson</h1>
            <p class="card-role">Design Systems at MLB</p>
          </div>
          <span class="card-flip-hint" aria-hidden="true">Click for stats</span>
        </div>
      </div>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>

</html>
